<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>TradeCheck - White Mode</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    :root{
      --bg:#f5f7fb;
      --card:#ffffff;
      --border:#dbe2ea;

      --green:#00a86b;
      --red:#e63946;
      --gold:#d97706;
      --blue:#2563eb;
      --purple:#7c3aed;

      --text:#111827;
      --dim:#6b7280;
      --dimmer:#e5e7eb;
    }

    body{
      background:linear-gradient(to bottom,#f8fafc,#eef2ff);
      color:var(--text);
      font-family:Arial, sans-serif;
      padding:20px;
    }

    .header{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:16px;
      padding:20px;
      margin-bottom:20px;

      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .title{
      font-size:24px;
      font-weight:bold;
    }

    .subtitle{
      color:var(--dim);
      margin-top:5px;
      font-size:14px;
    }

    .mode-buttons{
      display:flex;
      gap:10px;
    }

    .mode-btn{
      padding:10px 18px;
      border:none;
      border-radius:999px;
      cursor:pointer;
      font-weight:bold;
      background:var(--dimmer);
      color:var(--text);
    }

    .mode-btn.active{
      background:var(--blue);
      color:white;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:16px;
      padding:20px;
      margin-bottom:20px;
    }

    .card-title{
      font-size:18px;
      font-weight:bold;
      margin-bottom:15px;
    }

    .grade-box{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
    }

    .grade{
      font-size:48px;
      font-weight:bold;
      color:var(--green);
    }

    .percentage{
      font-size:32px;
      font-weight:bold;
    }

    .progress-bg{
      width:100%;
      height:10px;
      background:var(--dimmer);
      border-radius:999px;
      overflow:hidden;
      margin-top:10px;
    }

    .progress{
      height:100%;
      width:0%;
      background:var(--green);
      transition:0.3s;
    }

    .checklist{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .check-item{
      background:#f9fafb;
      border:1px solid var(--border);
      border-radius:12px;
      padding:14px;
      display:flex;
      align-items:center;
      gap:12px;
      cursor:pointer;
      transition:0.2s;
    }

    .check-item:hover{
      transform:translateY(-2px);
    }

    .check-item.checked{
      background:#ecfdf5;
      border-color:#a7f3d0;
    }

    .check-item input{
      width:20px;
      height:20px;
    }

    .badge{
      background:#dbeafe;
      color:var(--blue);
      padding:5px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:bold;
    }

    .section{
      margin-top:20px;
    }

    .info-box{
      background:#eff6ff;
      border:1px solid #bfdbfe;
      padding:16px;
      border-radius:14px;
      margin-top:20px;
    }

    .info-title{
      font-weight:bold;
      color:var(--blue);
      margin-bottom:8px;
    }

    .reset-btn{
      width:100%;
      margin-top:20px;
      padding:14px;
      border:none;
      border-radius:14px;
      background:var(--red);
      color:white;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
    }

    .reset-btn:hover{
      opacity:0.9;
    }

    @media(max-width:768px){
      .header{
        flex-direction:column;
        gap:15px;
        align-items:flex-start;
      }

      .grade-box{
        flex-direction:column;
        align-items:flex-start;
        gap:10px;
      }
    }
  </style>
</head>

<body>

  <div class="header">
    <div>
      <div class="title">⚡ TradeCheck</div>
      <div class="subtitle">
        US30 • XAUUSD • NAS100 • USOIL
      </div>
    </div>

    <div class="mode-buttons">
      <button class="mode-btn active">
        INTRADAY
      </button>

      <button class="mode-btn">
        SWING
      </button>
    </div>
  </div>

  <div class="card">

    <div class="card-title">
      Setup Grade
    </div>

    <div class="grade-box">
      <div class="grade" id="grade">
        A
      </div>

      <div class="percentage" id="percentage">
        0%
      </div>
    </div>

    <div class="progress-bg">
      <div class="progress" id="progress"></div>
    </div>

  </div>

  <div class="card">

    <div class="card-title">
      Trading Checklist
    </div>

    <div class="checklist">

      <label class="check-item">
        <input type="checkbox" class="check" />
        <span>Daily 200 MA confirms bullish trend</span>
      </label>

      <label class="check-item">
        <input type="checkbox" class="check" />
        <span>4H pivot cluster identified</span>
      </label>

      <label class="check-item">
        <input type="checkbox" class="check" />
        <span>15m wick rejection confirmed</span>
      </label>

      <label class="check-item">
        <input type="checkbox" class="check" />
        <span>2x volume spike alert triggered</span>
      </label>

      <label class="check-item">
        <input type="checkbox" class="check" />
        <span>Risk Reward ratio above 2:1</span>
      </label>

    </div>

    <button class="reset-btn" id="resetBtn">
      RESET CHECKLIST
    </button>

  </div>

  <div class="card">

    <div class="card-title">
      SL / TP Reference
    </div>

    <div class="section">
      <span class="badge">US30</span>

      <div style="margin-top:10px;">
        Stop Loss: 80–120 pts
      </div>

      <div style="margin-top:5px;">
        Take Profit: 200–350 pts
      </div>
    </div>

    <div class="section">
      <span class="badge">XAUUSD</span>

      <div style="margin-top:10px;">
        Stop Loss: 10–15 pts
      </div>

      <div style="margin-top:5px;">
        Take Profit: 30–50 pts
      </div>
    </div>

  </div>

  <div class="info-box">
    <div class="info-title">
      Pro Tip
    </div>

    <div>
      Trade only during London Open or NY Open for best volume confirmation and cleaner setups.
    </div>
  </div>

  <script>

    const checks = document.querySelectorAll(".check");
    const progress = document.getElementById("progress");
    const percentage = document.getElementById("percentage");
    const grade = document.getElementById("grade");
    const resetBtn = document.getElementById("resetBtn");

    function updateProgress(){

      let checked = 0;

      checks.forEach(check => {

        if(check.checked){
          checked++;
          check.parentElement.classList.add("checked");
        }else{
          check.parentElement.classList.remove("checked");
        }

      });

      const total = checks.length;
      const percent = Math.round((checked / total) * 100);

      progress.style.width = percent + "%";
      percentage.innerText = percent + "%";

      if(percent >= 90){
        grade.innerText = "A+";
        grade.style.color = "var(--green)";
      }
      else if(percent >= 70){
        grade.innerText = "A";
        grade.style.color = "var(--blue)";
      }
      else if(percent >= 50){
        grade.innerText = "B";
        grade.style.color = "var(--gold)";
      }
      else{
        grade.innerText = "C";
        grade.style.color = "var(--red)";
      }

    }

    checks.forEach(check => {
      check.addEventListener("change", updateProgress);
    });

    resetBtn.addEventListener("click", () => {

      checks.forEach(check => {
        check.checked = false;
      });

      updateProgress();

    });

    updateProgress();

  </script>

</body>
</html>
